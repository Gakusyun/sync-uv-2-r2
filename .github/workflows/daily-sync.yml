name: Daily Sync to R2

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: sync
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync

      - name: Configure AWS CLI for R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          aws configure set aws_access_key_id $R2_ACCESS_KEY_ID
          aws configure set aws_secret_access_key $R2_SECRET_ACCESS_KEY
          aws configure set region auto

      - name: Get latest version from GitHub
        id: latest-version
        run: |
          LATEST=$(curl -s https://api.github.com/repos/astral-sh/uv/releases/latest | jq -r '.tag_name')
          echo "version=$LATEST" >> $GITHUB_OUTPUT
          echo "Latest version: $LATEST"

      - name: Get current version from R2
        id: current-version
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          CURRENT=$(aws s3 ls s3://${R2_BUCKET_NAME}/sync2r2/astral-sh/uv/ \
            --endpoint-url https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com 2>/dev/null \
            | grep -oP '(?<=PRE )[0-9.]+(?=/)' | sort -V | tail -1 || echo "")
          echo "version=$CURRENT" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT"

      - name: Check if sync needed
        id: check
        run: |
          if [ "${{ steps.latest-version.outputs.version }}" == "${{ steps.current-version.outputs.version }}" ]; then
            echo "Version unchanged, skipping sync"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Version changed: ${{ steps.current-version.outputs.version }} -> ${{ steps.latest-version.outputs.version }}"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Run sync script
        if: steps.check.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TUNASYNC_WORKING_DIR: ./output
        run: uv run main.py --config uv-sync.json --workers 8

      - name: Sync to R2
        if: steps.check.outputs.skip == 'false'
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          aws s3 sync ./output s3://${R2_BUCKET_NAME}/sync2r2 \
            --endpoint-url https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com \
            --delete \
            --exclude "**/LatestRelease/*"
